runtime:
  seed: 42
  device: auto
  save_dir: outputs_extended

training:
  epochs: 220
  lr: 2.0e-3
  weight_decay: 1.0e-5

model:
  hidden_dim: 64
  num_experts: 3          # 3 experts, 4 regimes → expert sharing expected
  gate_hidden_dim: 64
  temperature: 0.60

data:
  overlap_std: 0.9
  phase_batch_size: 64
  phase_train_cycles: 40
  phase_test_cycles: 12
  transition_steps: 8
  num_regimes: 4          # 3 = original A/B/C only, 4 = add regime D
  random_regime_order: true  # false = fixed cyclic order

loss:
  alpha_dogma: 0.04
  beta_nomad: 0.05
  gamma_diversity: 0.08
  lambda_sep: 0.08
  lambda_cons: 0.03
  lambda_load: 0.03
  tau_k_min: 3
  tau_k_penalty: 0.05
  use_dynamic_tau: true
  tau_min: 2.0
  tau_max: 8.0
  tau_var_scale: 6.0
  tau_var_window: 8

delta:
  ema_decay: 0.80
  err_baseline_momentum: 0.85
  w_env: 1.0
  w_err: 2.0

switching:
  phi_scale_env: 1.0
  phi_scale_err: 1.5
  phi_scale_explain: 2.0
  phi_scale_gap: 1.0
  beta_phi: 0.02
  temp_stable: 0.30
  temp_transition: 1.00
  use_hard_switch: true
  phi_hard_threshold: 0.35

policy:
  policy_hidden_dim: 64
  policy_mix_weight: 0.25
  policy_weight_stay: 0.20
  policy_weight_target: 0.20
  policy_weight_mode: 0.10
  policy_switch_threshold: 0.50

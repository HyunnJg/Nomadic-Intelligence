runtime:
  seed: 42
  save_dir: outputs_transition
  device: auto   # auto / cpu / cuda

training:
  epochs: 220
  lr: 0.002
  weight_decay: 0.00001

model:
  hidden_dim: 64
  num_experts: 3
  gate_hidden_dim: 64
  temperature: 0.60

data:
  overlap_std: 0.9
  phase_batch_size: 64
  phase_train_cycles: 40
  phase_test_cycles: 12
  transition_steps: 8

loss:
  alpha_dogma: 0.04
  beta_nomad: 0.05
  gamma_diversity: 0.08
  lambda_sep: 0.08
  lambda_cons: 0.03
  lambda_load: 0.03
  tau_k_min: 3
  tau_k_penalty: 0.05

delta:
  ema_decay: 0.80
  err_baseline_momentum: 0.85
  w_env: 1.0
  w_err: 2.0

switching:
  phi_scale_env: 1.0
  phi_scale_err: 1.5
  phi_scale_explain: 1.5
  phi_scale_gap: 0.8

  temp_stable: 0.35
  temp_transition: 0.90

  use_hard_switch: true
  phi_hard_threshold: 0.30

  beta_phi: 0.02

policy:
  policy_hidden_dim: 64
  policy_mix_weight: 0.25
  policy_weight_stay: 0.20
  policy_weight_target: 0.20
  policy_weight_mode: 0.10
  policy_switch_threshold: 0.50

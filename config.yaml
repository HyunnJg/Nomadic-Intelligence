runtime:
  seed: 42
  save_dir: outputs_transition
  device: auto   # auto / cpu / cuda

training:
  epochs: 220
  lr: 0.002
  weight_decay: 0.00001

model:
  hidden_dim: 64
  num_experts: 3
  gate_hidden_dim: 64
  temperature: 0.60

data:
  overlap_std: 0.9
  phase_batch_size: 64
  phase_train_cycles: 40
  phase_test_cycles: 12
  transition_steps: 8

loss:
  alpha_dogma: 0.04
  beta_nomad: 0.05
  gamma_diversity: 0.08
  lambda_sep: 0.08
  lambda_cons: 0.03

delta:
  w_var: 1.5
  ema_decay: 0.80
  err_baseline_momentum: 0.85
  w_env: 1.0
  w_err: 2.0